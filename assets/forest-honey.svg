<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-labelledby="title desc">
  <title id="title">Forest honey jar</title>
  <desc id="desc">A dark forest honey jar with deep amber tones and a rustic atmosphere.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4e341d"/>
      <stop offset="100%" stop-color="#1f160f"/>
    </linearGradient>
    <linearGradient id="jar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a771" stop-opacity=".75"/>
      <stop offset="100%" stop-color="#5d3b19" stop-opacity=".95"/>
    </linearGradient>
    <linearGradient id="honey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8c4d0f"/>
      <stop offset="100%" stop-color="#3d220c"/>
