  </defs>
  <rect width="900" height="675" fill="url(#bg)"/>
  <rect y="500" width="900" height="175" fill="#2b1d12"/>
  <circle cx="760" cy="104" r="92" fill="#a56d1c" opacity=".2"/>
  <circle cx="162" cy="144" r="62" fill="#fff0bf" opacity=".08"/>
