<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-labelledby="title desc">
  <title id="title">Citrus honey jar</title>
  <desc id="desc">A bright citrus blossom honey jar with oranges and leaves.</desc>
  <defs>
